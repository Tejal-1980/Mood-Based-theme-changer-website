<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="main.css" />
</head>

<body>
  <h1>Welcome , Lets Begin 🎭</h1>
  <p class="topPara">Select the mood and see the magic </p>
  <main>
    <div class="btnContainer">
      <button class="moodBtn" data-effect="happy">😀</button>
      <button class="moodBtn" data-effect="sad">😔</button>
      <button class="moodBtn" data-effect="sleep">😴</button>
      <button class="moodBtn" data-effect="shake">😡</button>
      <button class="moodBtn" data-effect="heart">😍</button>

    </div>
    <div class="container">
      <p class="topPara">MOOD METER </p><br>
      <p class="topPara">Tune your vibe precisely</p>
      <input type="range" min="1" max="10" value="5" class="MoodSlider">
    </div>
  </main>


</body>
<script src="mainProject.js"></script>
<script src="login.js"></script>



</html>
